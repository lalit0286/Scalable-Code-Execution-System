upstream nextjs {
    server web:3000;
    keepalive 32;
}

upstream api {
    server api:3001;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=execute_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Payload size limit
    client_max_body_size 1m;

    # Timeouts
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── API routes ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Stricter limit for execute endpoint
    location /api/execute {
        limit_req zone=execute_limit burst=5 nodelay;

        proxy_pass http://api/api/execute;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health & metrics (no rate limit)
    location ~ ^/(health|metrics)$ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # ── Socket.io ────────────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://api/socket.io/;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Extended timeouts for long-lived WS connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Next.js HMR websocket (dev only)
        proxy_set_header Upgrade $http_upgrade;
    }

    # Static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://nextjs/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
